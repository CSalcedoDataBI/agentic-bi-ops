name: CI

# Two blocking checks on every pull request:
#   * `test` — the Pester suite (a failure blocks the merge; Board-ReviewGate
#     waits on it, and it can be marked "Required" in the branch ruleset, see #201).
#   * `docs` — the docs-freshness gate (#203 + #406): regenerate the derived README
#     regions from source and fail if they drift from what was committed; also
#     runs Publish-DocsWiki.ps1 -PagesOnly to verify that the wiki pages can still
#     be generated from the current README + commands/ without error.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Pester
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.5.0 -Force -Scope CurrentUser -SkipPublisherCheck
          Import-Module Pester -MinimumVersion 5.5.0
          (Get-Module Pester).Version.ToString()

      - name: Run Pester suite
        shell: pwsh
        run: |
          $cfg = New-PesterConfiguration
          $cfg.Run.Path              = 'plugins/agentic-board/tests'
          $cfg.Run.Throw             = $true          # non-zero exit on any failure -> blocks merge
          $cfg.Output.Verbosity      = 'Detailed'
          $cfg.TestResult.Enabled    = $true
          $cfg.TestResult.OutputPath = 'testResults.xml'
          $cfg.TestResult.OutputFormat = 'NUnitXml'
          Invoke-Pester -Configuration $cfg

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-results
          path: testResults.xml
          if-no-files-found: warn

  docs:
    name: Docs freshness
    runs-on: ubuntu-latest   # all-LF checkout, no autocrlf: a clean byte-for-byte diff
    steps:
      - uses: actions/checkout@v4

      # Regenerate the marked README regions (command catalog from frontmatter +
      # version from plugin.json) from their sources, rewriting in place.
      - name: Regenerate derived README regions
        shell: pwsh
        run: plugins/agentic-board/scripts/Update-Docs.ps1

      # If regeneration changed anything, the committed README was stale: a command
      # description or the version moved without the README being regenerated.
      - name: Fail if the README drifted from its sources
        run: |
          if ! git diff --exit-code -- README.md; then
            echo "::error::README is stale — a command description or the version changed without regenerating."
            echo "Fix it locally: run 'plugins/agentic-board/scripts/Update-Docs.ps1' and commit README.md."
            exit 1
          fi

      # Wiki docs freshness (#406): verify that the wiki pages can still be generated
      # from the current README + commands/ without error, and that every generated page
      # carries the <!-- GENERATED --> marker.  No git/network — pure -PagesOnly run.
      - name: Validate wiki doc generation
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP 'wiki-preview'
          & plugins/agentic-board/scripts/Publish-DocsWiki.ps1 -Root . -PagesOnly -OutDir $out
          $pages = @(Get-ChildItem $out -Filter '*.md')
          if ($pages.Count -eq 0) {
            Write-Host '::error::Wiki doc generation produced no pages.'
            exit 1
          }
          $bad = @($pages | Where-Object { (Get-Content $_.FullName -Raw) -notmatch '<!-- GENERATED' })
          if ($bad) {
            Write-Host "::error::Missing GENERATED marker in: $($bad.Name -join ', ')"
            exit 1
          }
          Write-Host "Wiki docs OK — $($pages.Count) page(s): $($pages.BaseName -join ', ')"
